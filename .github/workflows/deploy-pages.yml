name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Prepare build
        run: |
          mkdir -p _site
          cp -r frontend/* _site/
          mkdir -p _site/data
          cp -r data/product _site/data/
          cp data/type_chart.json _site/data/ 2>/dev/null || true
          cp data/skill_stone_sources.json _site/data/ 2>/dev/null || true
          cp data/skill_icons.json _site/data/ 2>/dev/null || true
          cp data/skill_index.json _site/data/ 2>/dev/null || true
          cp data/pay-good.jpg _site/data/ 2>/dev/null || true
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"
          retention-days: 1
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
