<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>精灵库编辑器 - 洛克王国世界PVP助手</title>
<link rel="stylesheet" href="../frontend/styles.css">
<link rel="stylesheet" href="editor.css">
</head>
<body>
<header class="app-header">
  <div class="header-inner">
    <h1 class="logo" style="cursor:pointer" onclick="Editor.showTab('pets')">精灵库编辑器</h1>
    <nav class="main-nav" id="editorNav">
      <a href="../frontend/" class="nav-item">← 返回</a>
      <button class="nav-item" data-tab="pets" onclick="Editor.showTab('pets')">精灵</button>
      <button class="nav-item" data-tab="skills" onclick="Editor.showTab('skills')">技能</button>
      <button class="nav-item" data-tab="check" onclick="Editor.showTab('check')">检查</button>
    </nav>
    <div style="margin-left:auto;display:flex;gap:8px;align-items:center">
      <span id="saveStatus" style="font-size:12px;color:var(--neutral-500)"></span>
      <button class="btn" onclick="Editor.saveAll()">保存全部</button>
    </div>
  </div>
</header>
<main id="mainContent">
  <div class="loading">加载数据中...</div>
</main>
<script src="editor.js"></script>
</body>
</html>
